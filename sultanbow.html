<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shooting Analysis</title>
<style>
body { margin:0; background:#ccc; display:flex; justify-content:center; }
canvas { background:#f0f0f0; touch-action: none; }
</style>
</head>
<body>

<canvas id="game" width="360" height="640"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 360;
const HEIGHT = 640;
const center = {x: WIDTH/2, y: HEIGHT/3};
const TARGET_RADIUS = 125;
const RED_RADIUS = TARGET_RADIUS * 0.35;

let shots = [];
let arrowColors = {};

let currentRound = 1;
let currentShot = 0;
let numRounds = 0;
let maxArrows = 0;

let state = "input"; // input, game, number, history, all

let inputRounds = "";
let inputArrows = "";
let activeInput = "rounds";

let selectedNumber = "";
let clickPos = {};
let pressedButton = null;

let histRound = 1;

// ---------- Функция подсчета очков ----------
function getScore(x,y){
    let dx = x - center.x;
    let dy = y - center.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= RED_RADIUS) return 2;
    else if (dist <= TARGET_RADIUS) return 1;
    else return 0;
}

// ---------- TARGET ----------
function drawTarget() {
    ctx.beginPath();
    ctx.arc(center.x, center.y, TARGET_RADIUS, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(center.x, center.y, RED_RADIUS, 0, Math.PI*2);
    ctx.fillStyle = "red";
    ctx.fill();
}

// ---------- BUTTON ----------
function drawButton(x,y,w,h,text,color="#777",id=null) {
    let isPressed = pressedButton === id;
    ctx.fillStyle = isPressed ? "#444" : color;
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,10);
    ctx.fill();
    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText(text, x + w/2 - ctx.measureText(text).width/2, y + h/2 + 6);
}

// ---------- KEYPAD ----------
function drawKeypad(startY){
    for (let i=0;i<10;i++){
        let x = 30 + (i%5)*60;
        let y = startY + Math.floor(i/5)*60;
        drawButton(x,y,50,50,i.toString(),"#888","key"+i);
    }
}

// ---------- INPUT ----------
function drawInput() {
    ctx.fillStyle="black";
    ctx.font="16px Arial";
    ctx.fillText("Rounds:",40,200);
    ctx.fillText("Arrows:",40,260);

    ctx.strokeStyle = activeInput==="rounds"?"green":"black";
    ctx.lineWidth = 2;
    ctx.strokeRect(120,180,120,40);

    ctx.strokeStyle = activeInput==="arrows"?"green":"black";
    ctx.strokeRect(120,240,120,40);

    ctx.fillText(inputRounds,130,205);
    ctx.fillText(inputArrows,130,265);

    drawKeypad(HEIGHT - 240);
    drawButton(60, HEIGHT-100, 100, 40, "DELETE","#e74c3c","deleteInput");
    drawButton(180, HEIGHT-100, 120, 40,"START","#2ecc71","start");
}

// ---------- GAME ----------
function drawGame() {
    drawTarget();

    // ---------- подсчет очков ----------
    let roundScore = shots.filter(s=>s.round===currentRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);

    ctx.fillStyle="black";
    ctx.fillText(`Round: ${currentRound}/${numRounds}`,10,20);
    ctx.fillText(`Arrow: ${currentShot}/${maxArrows}`,10,40);
    ctx.fillText(`Round Score: ${roundScore}`,10,60);
    ctx.fillText(`Total Score: ${totalScore}`,10,80);

    // показываем все стрелы текущего раунда с номерами
    shots.filter(s=>s.round===currentRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    // ---------- РОВНЫЕ КНОПКИ ВНИЗУ ----------
    let btnW = WIDTH/3 - 10;
    drawButton(5, HEIGHT-60, btnW, 40,"History","#3498db","hist");
    drawButton(5+btnW+5, HEIGHT-60, btnW, 40,"Reset","#f39c12","reset");
    drawButton(5+2*(btnW+5), HEIGHT-60, btnW, 40,"Restart","#e74c3c","restart");

    if (currentShot >= maxArrows && currentRound < numRounds){
        drawButton(80,HEIGHT-120,200,40,"Next Round","#27ae60","next");
    }
}

// ---------- NUMBER ----------
function drawNumber() {
    drawTarget();

    shots.filter(s=>s.round===currentRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    if (selectedNumber!==""){
        ctx.fillStyle="black";
        ctx.font="16px Arial";
        ctx.fillText(selectedNumber, clickPos.x-5, clickPos.y-15);
    }

    drawKeypad(HEIGHT - 240);
    drawButton(60,HEIGHT-100,240,40,"READY","#27ae60","ready");
    drawButton(60,HEIGHT-50,240,40,"DELETE","#e74c3c","deleteNumber");
}

// ---------- HISTORY ----------
function drawHistory(){
    drawTarget();

    let roundScore = shots.filter(s=>s.round===histRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);

    ctx.fillStyle="black";
    ctx.font="16px Arial";
    ctx.fillText(`Round ${histRound} Score: ${roundScore}`,50,30);

    shots.filter(s=>s.round===histRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    let btnW = WIDTH/4 - 10; 
    drawButton(5,HEIGHT-60,btnW,40,"Game","#27ae60","game");
    drawButton(5+btnW+5,HEIGHT-60,btnW,40,"Prev","#3498db","prev");
    drawButton(5+2*(btnW+5),HEIGHT-60,btnW,40,"Next","#3498db","nextHist");
    drawButton(5+3*(btnW+5),HEIGHT-60,btnW,40,"All","#9b59b6","all");
}

// ---------- ALL ----------
function drawAll(){
    drawTarget();

    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    ctx.fillStyle="black";
    ctx.fillText(`Total Score: ${totalScore}`,10,20);

    shots.forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });
    drawButton(10,HEIGHT-60,80,40,"Game","#27ae60","game");
    drawButton(130,HEIGHT-60,100,40,"Back","#3498db","backAll");
}

// ---------- CLICK ----------
canvas.addEventListener("mousedown", e=>{
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    pressedButton = null;

    // INPUT
    if (state==="input"){
        if (y>180 && y<220) activeInput="rounds";
        if (y>240 && y<280) activeInput="arrows";

        if (y>HEIGHT-100 && y<HEIGHT-60){
            if (x>60 && x<160){ // DELETE
                pressedButton="deleteInput";
                if (activeInput==="rounds") inputRounds=inputRounds.slice(0,-1);
                else inputArrows=inputArrows.slice(0,-1);
            }
            else if (x>180 && x<300){ // START
                pressedButton="start";
                numRounds=parseInt(inputRounds);
                maxArrows=parseInt(inputArrows);
                if (numRounds && maxArrows) state="game";
            }
        }

        let startY = HEIGHT - 240;
        if (y > startY && y < startY+120){
            let col = Math.floor((x-30)/60);
            let row = Math.floor((y-startY)/60);
            let num = row*5+col;
            if (num>=0 && num<=9){
                if (activeInput==="rounds") inputRounds+=num;
                else inputArrows+=num;
            }
        }
    }

    // GAME
    else if (state==="game"){
        if (y>HEIGHT-60){
            let btnW = WIDTH/3 - 10;
            if (x<5+btnW){ pressedButton="hist"; state="history"; histRound=currentRound; return; }
            else if (x>5+btnW+5 && x<5+2*btnW+5){ pressedButton="reset"; shots = shots.filter(s=>s.round!==currentRound); currentShot=0; return; }
            else if (x>5+2*(btnW+5)){ pressedButton="restart"; shots=[]; arrowColors={}; currentRound=1; currentShot=0; return; }
        }
        if (currentShot >= maxArrows && currentRound < numRounds){
            if (y>HEIGHT-120 && y<HEIGHT-80 && x>80 && x<280){
                pressedButton="next";
                currentRound++;
                currentShot=0;
            }
        }
        else if (currentShot < maxArrows){
            selectedNumber="";
            clickPos={x,y};
            state="number";
        }
    }

    // NUMBER
    else if (state==="number"){
        if (y>HEIGHT-50 && y<HEIGHT-10){ // DELETE
            pressedButton="deleteNumber";
            selectedNumber = selectedNumber.slice(0,-1);
        }
        if (y>HEIGHT-100 && y<HEIGHT-60){ // READY
            pressedButton="ready";
            if (selectedNumber==="") return;
            if (shots.some(s=>s.round===currentRound && s.num===selectedNumber)) return;
            arrowColors[selectedNumber] = arrowColors[selectedNumber] || `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
            shots.push({x:clickPos.x, y:clickPos.y, num:selectedNumber, round:currentRound});
            currentShot++;
            state="game";
        }

        let startY = HEIGHT - 240;
        if (y > startY && y < startY+120){
            let col = Math.floor((x-30)/60);
            let row = Math.floor((y-startY)/60);
            let num = row*5+col;
            if (num>=0 && num<=9) selectedNumber += num;
        }
    }

    // HISTORY
    else if (state==="history"){
        if (y>HEIGHT-60){
            let btnW = WIDTH/4 - 10;
            if (x>5 && x<5+btnW) pressedButton="game"; 
            if (x>5+btnW+5 && x<5+2*btnW+5) pressedButton="prev";
            if (x>5+2*(btnW+5) && x<5+3*btnW+15) pressedButton="nextHist";
            if (x>5+3*(btnW+5)) pressedButton="all";
        }

        if (pressedButton==="prev") histRound = Math.max(1,histRound-1);
        if (pressedButton==="nextHist") histRound = Math.min(numRounds,histRound+1);
        if (pressedButton==="all") state="all";
        if (pressedButton==="game") state="game";
    }

    // ALL
    else if (state==="all"){
        if (y>HEIGHT-60 && x>10 && x<90) pressedButton="game";
        if (y>HEIGHT-60 && x>130 && x<230) pressedButton="backAll";

        if (pressedButton==="backAll") state="history";
        if (pressedButton==="game") state="game";
    }
});

canvas.addEventListener("mouseup", ()=>{ pressedButton=null; });

// ---------- LOOP ----------
function loop(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    if (state==="input") drawInput();
    else if (state==="game") drawGame();
    else if (state==="number") drawNumber();
    else if (state==="history") drawHistory();
    else if (state==="all") drawAll();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
