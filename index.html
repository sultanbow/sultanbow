<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Qazaq mergeni</title> 
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#eef2f7,#dfe6ee);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial;
}
canvas{background:transparent;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
window.addEventListener("resize",resize);
resize();

let WIDTH, HEIGHT, center, TARGET_RADIUS, RED_RADIUS;
let KEY_SIZE, KEY_GAP, KEY_START_Y;

let shots=[]; 
let arrowColors={};
let currentRound=1,currentShot=0;
let numRounds=0,maxArrows=0;

let state="input";
let inputRounds="",inputArrows="";
let activeInput="rounds";
let selectedNumber="";
let clickPos={};
let pressedButton=null;
let pressTime={};
let histRound=1;

// ---------- SCORE ----------
function getScore(x,y){
let dx=x-center.x, dy=y-center.y;
let d=Math.sqrt(dx*dx+dy*dy);
if(d<=RED_RADIUS)return 2;
if(d<=TARGET_RADIUS)return 1;
return 0;
}

// ---------- BUTTON ----------
function drawButton(x,y,w,h,text,color,id){
let offsetY=0;
if(pressTime[id]){
let dt=Date.now()-pressTime[id];
if(dt<120) offsetY=4;
else delete pressTime[id];
}

ctx.save();
ctx.translate(x,y+offsetY);

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.beginPath();
ctx.roundRect(0,5,w,h,20);
ctx.fill();

ctx.fillStyle=pressedButton===id?"#2c3e50":color;
ctx.beginPath();
ctx.roundRect(0,0,w,h,20);
ctx.fill();

ctx.fillStyle="white";
ctx.font=`${Math.floor(h/2.5)}px Arial`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,w/2,h/2);

ctx.restore();
}

// ---------- TARGET ----------
function drawTarget(){
ctx.shadowColor="rgba(0,0,0,0.2)";
ctx.shadowBlur=20;

ctx.beginPath();
ctx.arc(center.x,center.y,TARGET_RADIUS,0,Math.PI*2);
ctx.fillStyle="#ffffff";
ctx.fill();

ctx.beginPath();
ctx.arc(center.x,center.y,RED_RADIUS*0.9,0,Math.PI*2);
ctx.fillStyle="#e74c3c";
ctx.fill();

ctx.shadowBlur=0;
}

// ---------- KEYPAD ----------
function drawKeypad(){
if(state==="history" || state==="all") return; // скрываем клавиатуру на истории и all
let startX=WIDTH/2-(5*(KEY_SIZE+KEY_GAP))/2;

for(let i=0;i<10;i++){
let x=startX+(i%5)*(KEY_SIZE+KEY_GAP);
let y=KEY_START_Y+Math.floor(i/5)*(KEY_SIZE+KEY_GAP);

let active = selectedNumber.endsWith(i.toString());

drawButton(
x,y,KEY_SIZE,KEY_SIZE,
i,
active?"#4CAF50":"#34495e",
"key"+i
);
}
}

// ---------- KEYPAD CLICK ----------
function handleKeypadClick(x,y){
if(state==="history" || state==="all") return null; // неактивна на истории и all
let startX=WIDTH/2-(5*(KEY_SIZE+KEY_GAP))/2;

if(y>=KEY_START_Y && y<=KEY_START_Y+KEY_SIZE*2+KEY_GAP){
let col=Math.floor((x-startX)/(KEY_SIZE+KEY_GAP));
let row=Math.floor((y-KEY_START_Y)/(KEY_SIZE+KEY_GAP));
let n=row*5+col;

if(n>=0&&n<=9){
pressedButton="key"+n;
pressTime["key"+n]=Date.now();
return n;
}
}
return null;
}

// ---------- ARROWS ----------
function drawArrows(arr){
arr.forEach(s=>{
ctx.fillStyle=arrowColors[s.num];
ctx.beginPath();
ctx.arc(s.x,s.y,Math.max(6,WIDTH/50),0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.font="14px Arial";
ctx.textAlign="center";
ctx.fillText(s.num,s.x,s.y+3);
});
}

// ---------- INPUT ----------
function drawInput(){
ctx.fillStyle="#2c3e50";
ctx.font="28px Arial";

let inputX=WIDTH*0.4;

ctx.textAlign="right";
ctx.textBaseline="middle";
ctx.fillText("Rounds:",inputX-20,HEIGHT*0.22+25);
ctx.fillText("Arrows:",inputX-20,HEIGHT*0.32+25);

ctx.strokeStyle=activeInput==="rounds"?"#4CAF50":"#999";
ctx.strokeRect(inputX,HEIGHT*0.22,WIDTH*0.3,50);

ctx.strokeStyle=activeInput==="arrows"?"#4CAF50":"#999";
ctx.strokeRect(inputX,HEIGHT*0.32,WIDTH*0.3,50);

ctx.textAlign="left";
ctx.fillText(inputRounds,inputX+10,HEIGHT*0.22+25);
ctx.fillText(inputArrows,inputX+10,HEIGHT*0.32+25);

drawKeypad();

let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 2;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
drawButton(gap,bottomY,btnW,bottomHeight,"DEL","#e74c3c","del");
drawButton(2*gap+btnW,bottomY,btnW,bottomHeight,"START","#2ecc71","start");
}

// ---------- GAME ----------
function drawGame(){
drawTarget();
drawArrows(shots.filter(s=>s.round===currentRound));

let rs=shots.filter(s=>s.round===currentRound).reduce((a,s)=>a+getScore(s.x,s.y),0);
let ts=shots.reduce((a,s)=>a+getScore(s.x,s.y),0);

ctx.fillStyle="#2c3e50";
ctx.font="20px Arial";
ctx.fillText(`Round ${currentRound}/${numRounds}`,WIDTH-220,40);
ctx.fillText(`Arrow ${currentShot}/${maxArrows}`,WIDTH-220,70);
ctx.fillText(`Round Score ${rs}`,WIDTH-220,100);
ctx.fillText(`Total ${ts}`,WIDTH-220,130);

// нижние кнопки
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 3;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
drawButton(gap,bottomY,btnW,bottomHeight,"Hist","#3498db","hist");
drawButton(2*gap+btnW,bottomY,btnW,bottomHeight,"Reset","#f39c12","reset");
drawButton(3*gap+2*btnW,bottomY,btnW,bottomHeight,"Restart","#e74c3c","restart");

// Next button над нижними кнопками, растянута от края до края
if(currentShot>=maxArrows && currentRound<numRounds){
let nextHeight = bottomHeight*0.9;
drawButton(0,bottomY-nextHeight-gap,WIDTH,nextHeight,"Next","#27ae60","next");
}
}

// ---------- NUMBER ----------
function drawNumber(){
drawTarget();
drawArrows(shots.filter(s=>s.round===currentRound));

if(selectedNumber){
ctx.fillStyle="#2c3e50";
ctx.font="24px Arial";
ctx.fillText(selectedNumber,clickPos.x,clickPos.y-20);
}

drawKeypad();

// DEL и READY рядом
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let gap = 20;
let btnCount = 2;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
drawButton(gap,bottomY,btnW,bottomHeight,"DEL","#e74c3c","delNum");
drawButton(2*gap+btnW,bottomY,btnW,bottomHeight,"READY","#2ecc71","ready");
}

// ---------- HISTORY ----------
function drawHistory(){
drawTarget();
drawArrows(shots.filter(s=>s.round===histRound));

ctx.fillText(`Round ${histRound}`,50,40);

let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 4;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
drawButton(gap,bottomY,btnW,bottomHeight,"Game","#2ecc71","game");
drawButton(2*gap+btnW,bottomY,btnW,bottomHeight,"Prev","#3498db","prev");
drawButton(3*gap+2*btnW,bottomY,btnW,bottomHeight,"Next","#3498db","nextH");
drawButton(4*gap+3*btnW,bottomY,btnW,bottomHeight,"All","#9b59b6","all");
}

// ---------- ALL ----------
function drawAll(){
drawTarget();
drawArrows(shots);

ctx.fillText("All shots",20,30);

// нижние кнопки только
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 2;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
drawButton(gap,bottomY,btnW,bottomHeight,"Game","#2ecc71","game");
drawButton(2*gap+btnW,bottomY,btnW,bottomHeight,"Back","#3498db","back");
}

// ---------- CLICK ----------
canvas.addEventListener("mousedown",e=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

function press(id){pressedButton=id;pressTime[id]=Date.now();}

// клавиатура
let key=handleKeypadClick(x,y);
if(key!==null){
if(state==="input"){
if(activeInput==="rounds")inputRounds+=key;
else inputArrows+=key;
}
else if(state==="number"){
selectedNumber+=key;
}
return;
}

// обработка нажатий по состояниям
if(state==="input"){
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let gap = 20;
let btnCount = 2;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
if(y>bottomY){
if(x<gap+btnW){press("del");
if(activeInput==="rounds")inputRounds=inputRounds.slice(0,-1);
else inputArrows=inputArrows.slice(0,-1);
}else if(x<2*gap+2*btnW){press("start"); numRounds=parseInt(inputRounds); maxArrows=parseInt(inputArrows); if(numRounds&&maxArrows)state="game";}
}
if(y>HEIGHT*0.22 && y<HEIGHT*0.28) activeInput="rounds";
if(y>HEIGHT*0.32 && y<HEIGHT*0.38) activeInput="arrows";
}

else if(state==="game"){
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let gap = 20;
let btnCount = 3;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
if(y>bottomY){
if(x<gap+btnW){press("hist"); state="history"; histRound=currentRound;}
else if(x<2*gap+2*btnW){press("reset"); shots=shots.filter(s=>s.round!==currentRound); currentShot=0;}
else{press("restart"); shots=[]; arrowColors={}; currentRound=1; currentShot=0;}
}
else if(currentShot>=maxArrows&&currentRound<numRounds){
let nextHeight = bottomHeight*0.9;
if(y>bottomY-nextHeight-20){press("next"); currentRound++; currentShot=0;}
}
else{
clickPos={x,y};
selectedNumber="";
state="number";
}
}

else if(state==="number"){
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let gap = 20;
let btnCount = 2;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
if(y>bottomY && y<bottomY+bottomHeight){
if(x<gap+btnW){press("delNum"); selectedNumber=selectedNumber.slice(0,-1);}
else if(x<2*gap+2*btnW){press("ready"); 
if(!selectedNumber) return;
if(shots.some(s=>s.round===currentRound&&s.num===selectedNumber)) return;
arrowColors[selectedNumber]=arrowColors[selectedNumber]||`hsl(${Math.random()*360},70%,60%)`;
shots.push({x:clickPos.x,y:clickPos.y,num:selectedNumber,round:currentRound});
currentShot++;
if(currentShot>=maxArrows){
if(currentRound>=numRounds)state="history";
else state="game";
}else state="game";
selectedNumber="";
}
}
}

else if(state==="history"){
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 4;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
if(y>bottomY){
if(x<gap+btnW){press("game"); state="game";}
else if(x<2*gap+2*btnW){press("prev"); histRound=Math.max(1,histRound-1);}
else if(x<3*gap+3*btnW){press("nextH"); histRound=Math.min(numRounds,histRound+1);}
else{press("all"); state="all";}
}
}

else if(state==="all"){
let bottomHeight = 96*1.2;
let bottomY = HEIGHT-bottomHeight-10;
let btnCount = 2;
let gap = 20;
let btnW = (WIDTH-(btnCount+1)*gap)/btnCount;
if(y>bottomY){
if(x<gap+btnW){press("game"); state="game";}
else{press("back"); state="history";}
}
}
});

canvas.addEventListener("mouseup",()=>pressedButton=null);

// ---------- LOOP ----------
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

WIDTH=canvas.width;
HEIGHT=canvas.height;
center={x:WIDTH/2,y:HEIGHT/3};

TARGET_RADIUS=Math.min(WIDTH,HEIGHT)/5*1.5;
RED_RADIUS=TARGET_RADIUS*0.35;

// клавиатура увеличена на 25%
KEY_SIZE=Math.min(80,WIDTH/8)*1.25;
KEY_GAP=12;
KEY_START_Y=HEIGHT*0.55;

if(state==="input")drawInput();
else if(state==="game")drawGame();
else if(state==="number")drawNumber();
else if(state==="history")drawHistory();
else if(state==="all")drawAll();

requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
