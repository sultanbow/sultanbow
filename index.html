<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shooting Analysis</title>
<style>
  html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family: Arial, sans-serif;
    user-select:none;
  }
  canvas {
    background:#f0f0f0;
    touch-action: none;
    display:block;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ---------- Адаптивный canvas ----------
function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let WIDTH = canvas.width;
let HEIGHT = canvas.height;
let center = {x: WIDTH/2, y: HEIGHT/3};
let TARGET_RADIUS = Math.min(WIDTH, HEIGHT)/5;
let RED_RADIUS = TARGET_RADIUS * 0.35;

// ---------- Игровые переменные ----------
let shots = [];
let arrowColors = {};
let currentRound = 1;
let currentShot = 0;
let numRounds = 0;
let maxArrows = 0;
let state = "input"; // input, game, number, history, all
let inputRounds = "";
let inputArrows = "";
let activeInput = "rounds";
let selectedNumber = "";
let clickPos = {};
let pressedButton = null;
let histRound = 1;

// ---------- Функция подсчета очков ----------
function getScore(x,y){
    let dx = x - center.x;
    let dy = y - center.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist <= RED_RADIUS) return 2;
    else if(dist <= TARGET_RADIUS) return 1;
    else return 0;
}

// ---------- Универсальная функция кнопки ----------
function drawButton(x,y,w,h,text,color="#777",id=null){
    let isPressed = pressedButton === id;
    ctx.fillStyle = isPressed ? "#555" : color;
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,10);
    ctx.fill();
    ctx.fillStyle="white";
    ctx.font=`${Math.floor(h/2)}px Arial`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(text, x + w/2, y + h/2);
}

// ---------- Рисуем мишень ----------
function drawTarget() {
    ctx.beginPath();
    ctx.arc(center.x, center.y, TARGET_RADIUS,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
    ctx.strokeStyle="black";
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(center.x, center.y, RED_RADIUS,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
}

// ---------- Рисуем клавиатуру ----------
function drawKeypad(startY){
    let btnSize = Math.min(60, WIDTH/8);
    for(let i=0;i<10;i++){
        let x = 30 + (i%5)*(btnSize+10);
        let y = startY + Math.floor(i/5)*(btnSize+10);
        drawButton(x,y,btnSize,btnSize,i.toString(),"#888","key"+i);
    }
}

// ---------- Рисуем стрелы ----------
function drawArrows(arr){
    arr.forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,Math.max(8,WIDTH/45),0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.font=`${Math.max(12,WIDTH/35)}px Arial`;
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText(s.num,s.x,s.y);
    });
}

// ---------- INPUT экран ----------
function drawInput(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    ctx.fillStyle="black";
    ctx.font="24px Arial";
    ctx.fillText("Rounds:",WIDTH*0.1, HEIGHT*0.3);
    ctx.fillText("Arrows:",WIDTH*0.1, HEIGHT*0.4);

    // Поля ввода
    ctx.strokeStyle = activeInput==="rounds"?"green":"black";
    ctx.lineWidth=3;
    ctx.strokeRect(WIDTH*0.4, HEIGHT*0.28, WIDTH*0.3, HEIGHT*0.06);
    ctx.strokeStyle = activeInput==="arrows"?"green":"black";
    ctx.strokeRect(WIDTH*0.4, HEIGHT*0.38, WIDTH*0.3, HEIGHT*0.06);
    ctx.fillText(inputRounds, WIDTH*0.55, HEIGHT*0.31);
    ctx.fillText(inputArrows, WIDTH*0.55, HEIGHT*0.41);

    drawKeypad(HEIGHT - HEIGHT*0.35);
    drawButton(WIDTH*0.15, HEIGHT-HEIGHT*0.15, WIDTH*0.25, HEIGHT*0.07,"DELETE","#e74c3c","deleteInput");
    drawButton(WIDTH*0.55, HEIGHT-HEIGHT*0.15, WIDTH*0.3, HEIGHT*0.07,"START","#2ecc71","start");
}

// ---------- GAME экран ----------
function drawGame(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    drawTarget();
    drawArrows(shots.filter(s=>s.round===currentRound));

    let roundScore = shots.filter(s=>s.round===currentRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);

    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.textAlign="left";
    ctx.fillText(`Round: ${currentRound}/${numRounds}`,10,30);
    ctx.fillText(`Arrow: ${currentShot}/${maxArrows}`,10,60);
    ctx.fillText(`Round Score: ${roundScore}`,10,90);
    ctx.fillText(`Total Score: ${totalScore}`,10,120);

    // Кнопки внизу
    let btnW = WIDTH/3 - 10;
    drawButton(5, HEIGHT-60, btnW, 50,"History","#3498db","hist");
    drawButton(5+btnW+5, HEIGHT-60, btnW, 50,"Reset","#f39c12","reset");
    drawButton(5+2*(btnW+5), HEIGHT-60, btnW, 50,"Restart","#e74c3c","restart");

    if(currentShot>=maxArrows && currentRound<numRounds){
        drawButton(WIDTH*0.3, HEIGHT-140, WIDTH*0.4, 50,"Next Round","#27ae60","next");
    }
}

// ---------- NUMBER экран ----------
function drawNumber(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    drawTarget();
    drawArrows(shots.filter(s=>s.round===currentRound));
    if(selectedNumber!==""){
        ctx.fillStyle="black";
        ctx.font="20px Arial";
        ctx.fillText(selectedNumber, clickPos.x, clickPos.y-20);
    }
    drawKeypad(HEIGHT - HEIGHT*0.35);
    drawButton(WIDTH*0.15, HEIGHT-HEIGHT*0.15, WIDTH*0.7, HEIGHT*0.07,"READY","#27ae60","ready");
    drawButton(WIDTH*0.15, HEIGHT-HEIGHT*0.08, WIDTH*0.7, HEIGHT*0.07,"DELETE","#e74c3c","deleteNumber");
}

// ---------- HISTORY экран ----------
function drawHistory(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    drawTarget();
    let roundScore = shots.filter(s=>s.round===histRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    ctx.fillStyle="black";
    ctx.font="24px Arial";
    ctx.fillText(`Round ${histRound} Score: ${roundScore}`,WIDTH*0.3, 40);
    drawArrows(shots.filter(s=>s.round===histRound));

    let btnW = WIDTH/4 - 10;
    drawButton(5, HEIGHT-60, btnW, 50,"Game","#27ae60","game");
    drawButton(5+btnW+5, HEIGHT-60, btnW, 50,"Prev","#3498db","prev");
    drawButton(5+2*(btnW+5), HEIGHT-60, btnW, 50,"Next","#3498db","nextHist");
    drawButton(5+3*(btnW+5), HEIGHT-60, btnW, 50,"All","#9b59b6","all");
}

// ---------- ALL экран ----------
function drawAll(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    drawTarget();
    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    ctx.fillStyle="black";
    ctx.font="24px Arial";
    ctx.fillText(`Total Score: ${totalScore}`,10,40);
    drawArrows(shots);

    drawButton(10, HEIGHT-60, 80, 50,"Game","#27ae60","game");
    drawButton(100, HEIGHT-60, 120, 50,"Back","#3498db","backAll");
}

// ---------- CLICK обработка ----------
canvas.addEventListener("mousedown", e=>{
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    pressedButton=null;

    // INPUT
    if(state==="input"){
        if(y>HEIGHT*0.28 && y<HEIGHT*0.34) activeInput="rounds";
        if(y>HEIGHT*0.38 && y<HEIGHT*0.44) activeInput="arrows";

        // DELETE / START
        if(y>HEIGHT-HEIGHT*0.15 && y<HEIGHT-HEIGHT*0.08){
            if(x>WIDTH*0.15 && x<WIDTH*0.4){ // DELETE
                pressedButton="deleteInput";
                if(activeInput==="rounds") inputRounds=inputRounds.slice(0,-1);
                else inputArrows=inputArrows.slice(0,-1);
            }
            else if(x>WIDTH*0.55 && x<WIDTH*0.85){ // START
                pressedButton="start";
                numRounds=parseInt(inputRounds);
                maxArrows=parseInt(inputArrows);
                if(numRounds && maxArrows) state="game";
            }
        }

        // KEYPAD
        let startY = HEIGHT - HEIGHT*0.35;
        let btnSize = Math.min(60, WIDTH/8);
        if(y > startY && y < startY + btnSize*2 + 10){
            let col = Math.floor((x-30)/(btnSize+10));
            let row = Math.floor((y-startY)/(btnSize+10));
            let num = row*5+col;
            if(num>=0 && num<=9){
                if(activeInput==="rounds") inputRounds+=num;
                else inputArrows+=num;
            }
        }
    }

    // GAME
    else if(state==="game"){
        if(y>HEIGHT-60){
            let btnW = WIDTH/3 - 10;
            if(x<5+btnW){ pressedButton="hist"; state="history"; histRound=currentRound; return; }
            else if(x>5+btnW+5 && x<5+2*btnW+5){ pressedButton="reset"; shots=shots.filter(s=>s.round!==currentRound); currentShot=0; return; }
            else if(x>5+2*(btnW+5)){ pressedButton="restart"; shots=[]; arrowColors={}; currentRound=1; currentShot=0; return; }
        }
        if(currentShot>=maxArrows && currentRound<numRounds){
            if(x>WIDTH*0.3 && x<WIDTH*0.7 && y>HEIGHT-140 && y<HEIGHT-90){
                pressedButton="next"; currentRound++; currentShot=0;
            }
        }
        else if(currentShot<maxArrows){
            selectedNumber=""; clickPos={x,y}; state="number";
        }
    }

    // NUMBER
    else if(state==="number"){
        // DELETE / READY
        if(y>HEIGHT-HEIGHT*0.08 && y<HEIGHT){ pressedButton="deleteNumber"; selectedNumber=selectedNumber.slice(0,-1);}
        if(y>HEIGHT-HEIGHT*0.15 && y<HEIGHT-HEIGHT*0.08){ 
            pressedButton="ready"; 
            if(selectedNumber==="" || shots.some(s=>s.round===currentRound && s.num===selectedNumber)) return;
            arrowColors[selectedNumber]=arrowColors[selectedNumber]||`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
            shots.push({x:clickPos.x, y:clickPos.y, num:selectedNumber, round:currentRound});
            currentShot++; state="game";
        }
        // KEYPAD
        let startY = HEIGHT - HEIGHT*0.35;
        let btnSize = Math.min(60, WIDTH/8);
        if(y > startY && y < startY + btnSize*2 + 10){
            let col = Math.floor((x-30)/(btnSize+10));
            let row = Math.floor((y-startY)/(btnSize+10));
            let num = row*5+col;
            if(num>=0 && num<=9) selectedNumber+=num;
        }
    }

    // HISTORY
    else if(state==="history"){
        let btnW = WIDTH/4 - 10;
        if(y>HEIGHT-60){
            if(x>5 && x<5+btnW) pressedButton="game";
            if(x>5+btnW+5 && x<5+2*btnW+5) pressedButton="prev";
            if(x>5+2*(btnW+5) && x<5+3*btnW+5) pressedButton="nextHist";
            if(x>5+3*(btnW+5)) pressedButton="all";
        }
        if(pressedButton==="prev") histRound=Math.max(1,histRound-1);
        if(pressedButton==="nextHist") histRound=Math.min(numRounds,histRound+1);
        if(pressedButton==="all") state="all";
        if(pressedButton==="game") state="game";
    }

    // ALL
    else if(state==="all"){
        if(y>HEIGHT-60){
            if(x>10 && x<90) pressedButton="game";
            if(x>100 && x<220) pressedButton="backAll";
        }
        if(pressedButton==="backAll") state="history";
        if(pressedButton==="game") state="game";
    }
});

canvas.addEventListener("mouseup", ()=>{pressedButton=null;});

// ---------- LOOP ----------
function loop(){
    WIDTH = canvas.width; HEIGHT = canvas.height;
    center = {x: WIDTH/2, y: HEIGHT/3};
    TARGET_RADIUS = Math.min(WIDTH, HEIGHT)/5;
    RED_RADIUS = TARGET_RADIUS*0.35;

    if(state==="input") drawInput();
    else if(state==="game") drawGame();
    else if(state==="number") drawNumber();
    else if(state==="history") drawHistory();
    else if(state==="all") drawAll();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
