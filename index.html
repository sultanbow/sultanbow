<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shooting Analysis</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:#ccc; font-family:Arial;}
canvas { background:#f0f0f0; display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let WIDTH, HEIGHT, center;
let TARGET_RADIUS, RED_RADIUS;

let shots = [];
let arrowColors = {};
let currentRound = 1, currentShot = 0;
let numRounds = 0, maxArrows = 0;

let state = "input"; // input, game, number, history, all
let inputRounds = "", inputArrows = "";
let activeInput = "rounds";
let selectedNumber = "";
let clickPos = {};
let pressedButton = null;
let histRound = 1;

// ---------- RESIZE ----------
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  WIDTH = canvas.width;
  HEIGHT = canvas.height;
  center = {x: WIDTH/2, y: HEIGHT/3};
  TARGET_RADIUS = Math.min(WIDTH, HEIGHT)/5;
  RED_RADIUS = TARGET_RADIUS * 0.35;
}
window.addEventListener("resize", resize);
resize();

// ---------- SCORE ----------
function getScore(x, y){
  let dx = x - center.x, dy = y - center.y;
  let d = Math.sqrt(dx*dx + dy*dy);
  if(d <= RED_RADIUS) return 2;
  if(d <= TARGET_RADIUS) return 1;
  return 0;
}

// ---------- BUTTON ----------
function drawButton(x, y, w, h, text, color, id=null){
  ctx.fillStyle = pressedButton===id ? "#444" : color;
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,10);
  ctx.fill();
  ctx.fillStyle="white";
  ctx.font = Math.floor(h/2) + "px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(text, x+w/2, y+h/2);
}

// ---------- TARGET ----------
function drawTarget(){
  ctx.beginPath();
  ctx.arc(center.x, center.y, TARGET_RADIUS,0,Math.PI*2);
  ctx.fillStyle="white"; ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(center.x, center.y, RED_RADIUS,0,Math.PI*2);
  ctx.fillStyle="red"; ctx.fill();
}

// ---------- KEYPAD ----------
function drawKeypad(startY, scale=1.5){
  let size = Math.min(80, WIDTH/8) * scale;
  let startX = WIDTH/2 - (5*(size+10))/2;
  let colors = ["#e74c3c","#f39c12","#2ecc71","#3498db","#9b59b6","#1abc9c","#e67e22","#8e44ad","#34495e","#f1c40f"];
  for(let i=0;i<10;i++){
    let x = startX + (i%5)*(size+10);
    let y = startY + Math.floor(i/5)*(size+10);
    drawButton(x,y,size,size,i,colors[i],"key"+i);
  }
}

// ---------- ARROWS ----------
function drawArrows(arr){
  arr.forEach(s=>{
    ctx.fillStyle = arrowColors[s.num];
    ctx.beginPath();
    ctx.arc(s.x,s.y,Math.max(6,WIDTH/50),0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="black";
    ctx.font="14px Arial";
    ctx.textAlign="center";
    ctx.fillText(s.num, s.x, s.y+3);
  });
}

// ---------- INPUT SCREEN ----------
function drawInput(){
  ctx.fillStyle="black"; ctx.font="32px Arial"; ctx.textAlign="right";
  ctx.fillText("Rounds:", WIDTH*0.38, HEIGHT*0.245);
  ctx.fillText("Arrows:", WIDTH*0.38, HEIGHT*0.345);

  ctx.strokeStyle = activeInput==="rounds"?"green":"black";
  ctx.strokeRect(WIDTH*0.4, HEIGHT*0.22, WIDTH*0.3, 50);
  ctx.strokeStyle = activeInput==="arrows"?"green":"black";
  ctx.strokeRect(WIDTH*0.4, HEIGHT*0.32, WIDTH*0.3, 50);

  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText(inputRounds, WIDTH*0.45, HEIGHT*0.22+25);
  ctx.fillText(inputArrows, WIDTH*0.45, HEIGHT*0.32+25);

  // клавиатура по центру между полями и кнопками
  let kbStartY = (HEIGHT*0.4 + HEIGHT-110)/2 - 60;
  drawKeypad(kbStartY, 1.5);

  drawButton(WIDTH*0.15, HEIGHT-110, 220, 70, "DEL", "#e74c3c","del");
  drawButton(WIDTH*0.55, HEIGHT-110, 260, 70, "START", "#2ecc71","start");
}

// ---------- GAME SCREEN ----------
function drawGame(){
  drawTarget();
  drawArrows(shots.filter(s=>s.round===currentRound));

  let roundScore = shots.filter(s=>s.round===currentRound).reduce((a,s)=>a+getScore(s.x,s.y),0);
  let totalScore = shots.reduce((a,s)=>a+getScore(s.x,s.y),0);

  ctx.fillStyle="black"; ctx.font="20px Arial"; ctx.textAlign="right";
  ctx.fillText(`Round ${currentRound}/${numRounds}`, WIDTH-20, 30);
  ctx.fillText(`Arrow ${currentShot}/${maxArrows}`, WIDTH-20, 60);
  ctx.fillText(`Round Score ${roundScore}`, WIDTH-20, 90);
  ctx.fillText(`Total ${totalScore}`, WIDTH-20, 120);

  let w = WIDTH/3 - 5;
  drawButton(5, HEIGHT-60, w, 60, "Hist", "#3498db", "hist");
  drawButton(5+w+5, HEIGHT-60, w, 60, "Reset", "#f39c12", "reset");
  drawButton(5+2*(w+5), HEIGHT-60, w, 60, "Restart", "#e74c3c", "restart");

  if(currentShot>=maxArrows && currentRound<numRounds){
    drawButton(WIDTH/2-100, HEIGHT-140, 200, 60, "Next", "#27ae60","next");
  }
}

// ---------- NUMBER SCREEN ----------
function drawNumber(){
  drawTarget();
  drawArrows(shots.filter(s=>s.round===currentRound));

  if(selectedNumber){
    ctx.fillStyle="black"; ctx.font="22px Arial";
    ctx.textAlign="center";
    ctx.fillText(selectedNumber, clickPos.x, clickPos.y-20);
  }

  // клавиатура увеличена и по центру
  let kbStartY = HEIGHT/2;
  drawKeypad(kbStartY,1.5);

  drawButton(WIDTH/2-120, HEIGHT-150, 240, 60,"READY","#2ecc71","ready");
  drawButton(WIDTH/2-120, HEIGHT-80, 240, 60,"DEL","#e74c3c","delNum");
}

// ---------- CLICK HANDLER ----------
canvas.addEventListener("mousedown", e=>{
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  pressedButton = null;

  if(state==="input"){
    if(y>HEIGHT*0.22 && y<HEIGHT*0.28) activeInput="rounds";
    if(y>HEIGHT*0.32 && y<HEIGHT*0.38) activeInput="arrows";

    if(y>HEIGHT-110){
      if(x<WIDTH/2){
        pressedButton="del";
        if(activeInput==="rounds") inputRounds=inputRounds.slice(0,-1);
        else inputArrows=inputArrows.slice(0,-1);
      }else{
        pressedButton="start";
        numRounds=parseInt(inputRounds);
        maxArrows=parseInt(inputArrows);
        if(numRounds&&maxArrows) state="game";
      }
    }

    let size=Math.min(80,WIDTH/8)*1.5;
    let startX=WIDTH/2-(5*(size+10))/2;
    let startY = (HEIGHT*0.4 + HEIGHT-110)/2 - 60;

    if(y>startY && y<startY+size*2){
      let col = Math.floor((x-startX)/(size+10));
      let row = Math.floor((y-startY)/(size+10));
      let n = row*5+col;
      if(n>=0 && n<=9){
        pressedButton="key"+n;
        if(activeInput==="rounds") inputRounds+=n;
        else inputArrows+=n;
      }
    }
  }
});

canvas.addEventListener("mouseup", ()=>{pressedButton=null;});

// ---------- LOOP ----------
function loop(){
  ctx.clearRect(0,0,WIDTH,HEIGHT);
  if(state==="input") drawInput();
  else if(state==="game") drawGame();
  else if(state==="number") drawNumber();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
