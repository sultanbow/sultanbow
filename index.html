<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shooting Analysis</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ccc;
}
canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #f0f0f0;
    touch-action: none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;
canvas.width = WIDTH;
canvas.height = HEIGHT;

let center = {x: WIDTH/2, y: HEIGHT/3};
let TARGET_RADIUS = Math.min(WIDTH, HEIGHT)/5;
let RED_RADIUS = TARGET_RADIUS * 0.35;

let shots = [];
let arrowColors = {};
let currentRound = 1;
let currentShot = 0;
let numRounds = 0;
let maxArrows = 0;
let state = "input";

let inputRounds = "";
let inputArrows = "";
let activeInput = "rounds";
let selectedNumber = "";
let clickPos = {};
let pressedButton = null;
let histRound = 1;

// ---------- SCORE ----------
function getScore(x,y){
    let dx = x - center.x;
    let dy = y - center.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= RED_RADIUS) return 2;
    else if (dist <= TARGET_RADIUS) return 1;
    else return 0;
}

// ---------- RESIZE ----------
window.addEventListener("resize", ()=>{
    WIDTH = window.innerWidth;
    HEIGHT = window.innerHeight;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    center = {x: WIDTH/2, y: HEIGHT/3};
    TARGET_RADIUS = Math.min(WIDTH, HEIGHT)/5;
    RED_RADIUS = TARGET_RADIUS * 0.35;
});

// ---------- DRAW TARGET ----------
function drawTarget() {
    ctx.beginPath();
    ctx.arc(center.x, center.y, TARGET_RADIUS, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(center.x, center.y, RED_RADIUS, 0, Math.PI*2);
    ctx.fillStyle = "red";
    ctx.fill();
}

// ---------- DRAW BUTTON ----------
function drawButton(x,y,w,h,text,color="#777",id=null) {
    let isPressed = pressedButton === id;
    ctx.fillStyle = isPressed ? "#444" : color;
    ctx.beginPath();
    ctx.roundRect(x,y,w,h,10);
    ctx.fill();
    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText(text, x + w/2 - ctx.measureText(text).width/2, y + h/2 + 6);
}

// ---------- DRAW KEYPAD ----------
function drawKeypad(startY){
    let btnSize = Math.min(60, WIDTH/6);
    for (let i=0;i<10;i++){
        let x = 30 + (i%5)*(btnSize+10);
        let y = startY + Math.floor(i/5)*(btnSize+10);
        drawButton(x,y,btnSize,btnSize,i.toString(),"#888","key"+i);
    }
}

// ---------- DRAW INPUT SCREEN ----------
function drawInput() {
    ctx.fillStyle="black";
    ctx.font="16px Arial";
    ctx.fillText("Rounds:",WIDTH*0.1, HEIGHT*0.3);
    ctx.fillText("Arrows:",WIDTH*0.1, HEIGHT*0.38);

    ctx.strokeStyle = activeInput==="rounds"?"green":"black";
    ctx.lineWidth = 2;
    ctx.strokeRect(WIDTH*0.4, HEIGHT*0.28, WIDTH*0.4, 40);

    ctx.strokeStyle = activeInput==="arrows"?"green":"black";
    ctx.strokeRect(WIDTH*0.4, HEIGHT*0.36, WIDTH*0.4, 40);

    ctx.fillText(inputRounds, WIDTH*0.42, HEIGHT*0.3 + 15);
    ctx.fillText(inputArrows, WIDTH*0.42, HEIGHT*0.38 + 15);

    drawKeypad(HEIGHT - 250);
    drawButton(WIDTH*0.15, HEIGHT-100, 100, 40, "DELETE","#e74c3c","deleteInput");
    drawButton(WIDTH*0.55, HEIGHT-100, 120, 40,"START","#2ecc71","start");
}

// ---------- DRAW GAME ----------
function drawGame() {
    drawTarget();

    let roundScore = shots.filter(s=>s.round===currentRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);

    ctx.fillStyle="black";
    ctx.fillText(`Round: ${currentRound}/${numRounds}`,10,20);
    ctx.fillText(`Arrow: ${currentShot}/${maxArrows}`,10,40);
    ctx.fillText(`Round Score: ${roundScore}`,10,60);
    ctx.fillText(`Total Score: ${totalScore}`,10,80);

    shots.filter(s=>s.round===currentRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    // нижние кнопки
    let btnW = (WIDTH-20)/3;
    drawButton(5, HEIGHT-60, btnW, 40,"History","#3498db","hist");
    drawButton(10+btnW, HEIGHT-60, btnW, 40,"Reset","#f39c12","reset");
    drawButton(15+2*btnW, HEIGHT-60, btnW, 40,"Restart","#e74c3c","restart");

    if (currentShot >= maxArrows && currentRound < numRounds){
        drawButton(WIDTH/4, HEIGHT-120, WIDTH/2, 40,"Next Round","#27ae60","next");
    }
}

// ---------- DRAW NUMBER ----------
function drawNumber() {
    drawTarget();

    shots.filter(s=>s.round===currentRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    if (selectedNumber!==""){
        ctx.fillStyle="black";
        ctx.font="16px Arial";
        ctx.fillText(selectedNumber, clickPos.x-5, clickPos.y-15);
    }

    drawKeypad(HEIGHT - 250);
    drawButton(WIDTH*0.15, HEIGHT-100, WIDTH*0.7, 40,"READY","#27ae60","ready");
    drawButton(WIDTH*0.15, HEIGHT-50, WIDTH*0.7, 40,"DELETE","#e74c3c","deleteNumber");
}

// ---------- DRAW HISTORY ----------
function drawHistory(){
    drawTarget();

    let roundScore = shots.filter(s=>s.round===histRound).reduce((sum,s)=>sum+getScore(s.x,s.y),0);

    ctx.fillStyle="black";
    ctx.font="16px Arial";
    ctx.fillText(`Round ${histRound} Score: ${roundScore}`,50,30);

    shots.filter(s=>s.round===histRound).forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });

    let btnW = (WIDTH-25)/4; 
    drawButton(5,HEIGHT-60,btnW,40,"Game","#27ae60","game");
    drawButton(10+btnW,HEIGHT-60,btnW,40,"Prev","#3498db","prev");
    drawButton(15+2*btnW,HEIGHT-60,btnW,40,"Next","#3498db","nextHist");
    drawButton(20+3*btnW,HEIGHT-60,btnW,40,"All","#9b59b6","all");
}

// ---------- DRAW ALL ----------
function drawAll(){
    drawTarget();

    let totalScore = shots.reduce((sum,s)=>sum+getScore(s.x,s.y),0);
    ctx.fillStyle="black";
    ctx.fillText(`Total Score: ${totalScore}`,10,20);

    shots.forEach(s=>{
        ctx.fillStyle=arrowColors[s.num];
        ctx.beginPath();
        ctx.arc(s.x,s.y,8,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="black";
        ctx.fillText(s.num,s.x-5,s.y+5);
    });
    drawButton(10,HEIGHT-60,80,40,"Game","#27ae60","game");
    drawButton(130,HEIGHT-60,100,40,"Back","#3498db","backAll");
}

// ---------- CLICK HANDLER ----------
canvas.addEventListener("mousedown", e=>{
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    pressedButton = null;

    // здесь код обработки кликов — можно использовать предыдущий пример, просто подставить WIDTH/HEIGHT
});

canvas.addEventListener("mouseup", ()=>{ pressedButton=null; });

// ---------- LOOP ----------
function loop(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    if (state==="input") drawInput();
    else if (state==="game") drawGame();
    else if (state==="number") drawNumber();
    else if (state==="history") drawHistory();
    else if (state==="all") drawAll();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
