<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shooting Analysis</title>
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#eef2f7,#dfe6ee);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial;
}
canvas{background:transparent;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
window.addEventListener("resize",resize);
resize();

let WIDTH, HEIGHT, center, TARGET_RADIUS, RED_RADIUS;

// кнопки
let BTN_W, BTN_H;

// клавиатура
let KEY_SIZE, KEY_GAP, KEY_START_Y;

let shots=[];
let arrowColors={};
let currentRound=1,currentShot=0;
let numRounds=0,maxArrows=0;

let state="input";
let inputRounds="",inputArrows="";
let activeInput="rounds";
let selectedNumber="";
let clickPos={};
let pressedButton=null;
let pressTime={};
let histRound=1;

// ---------- SCORE ----------
function getScore(x,y){
let dx=x-center.x, dy=y-center.y;
let d=Math.sqrt(dx*dx+dy*dy);
if(d<=RED_RADIUS)return 2;
if(d<=TARGET_RADIUS)return 1;
return 0;
}

// ---------- BUTTON ----------
function drawButton(x,y,text,color,id){
let offsetY=0;

if(pressTime[id]){
let dt=Date.now()-pressTime[id];
if(dt<120) offsetY=5;
else delete pressTime[id];
}

ctx.save();
ctx.translate(x,y+offsetY);

// тень
ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.beginPath();
ctx.roundRect(0,6,BTN_W,BTN_H,20);
ctx.fill();

// кнопка
ctx.fillStyle=pressedButton===id?"#2c3e50":color;
ctx.beginPath();
ctx.roundRect(0,0,BTN_W,BTN_H,20);
ctx.fill();

// текст
ctx.fillStyle="white";
ctx.font=`${Math.floor(BTN_H/2.8)}px Arial`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,BTN_W/2,BTN_H/2);

ctx.restore();
}

// ---------- TARGET ----------
function drawTarget(){
ctx.shadowColor="rgba(0,0,0,0.2)";
ctx.shadowBlur=20;

ctx.beginPath();
ctx.arc(center.x,center.y,TARGET_RADIUS,0,Math.PI*2);
ctx.fillStyle="#fff";
ctx.fill();

ctx.beginPath();
ctx.arc(center.x,center.y,RED_RADIUS*0.9,0,Math.PI*2);
ctx.fillStyle="#e74c3c";
ctx.fill();

ctx.shadowBlur=0;
}

// ---------- KEYPAD ----------
function drawKeypad(){
let startX=WIDTH/2-(5*(KEY_SIZE+KEY_GAP))/2;

for(let i=0;i<10;i++){
let x=startX+(i%5)*(KEY_SIZE+KEY_GAP);
let y=KEY_START_Y+Math.floor(i/5)*(KEY_SIZE+KEY_GAP);

let active=selectedNumber.endsWith(i.toString());

ctx.fillStyle=active?"#4CAF50":"#34495e";
ctx.beginPath();
ctx.roundRect(x,y,KEY_SIZE,KEY_SIZE,18);
ctx.fill();

ctx.fillStyle="white";
ctx.font=`${KEY_SIZE/2}px Arial`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(i,x+KEY_SIZE/2,y+KEY_SIZE/2);
}
}

function handleKeypadClick(x,y){
let startX=WIDTH/2-(5*(KEY_SIZE+KEY_GAP))/2;

if(y>KEY_START_Y && y<KEY_START_Y+KEY_SIZE*2+KEY_GAP){
let col=Math.floor((x-startX)/(KEY_SIZE+KEY_GAP));
let row=Math.floor((y-KEY_START_Y)/(KEY_SIZE+KEY_GAP));
let n=row*5+col;
if(n>=0&&n<=9)return n;
}
return null;
}

// ---------- INPUT ----------
function drawInput(){
ctx.fillStyle="#2c3e50";
ctx.font="28px Arial";

let inputX=WIDTH*0.4;

ctx.textAlign="right";
ctx.fillText("Rounds:",inputX-20,HEIGHT*0.22+25);
ctx.fillText("Arrows:",inputX-20,HEIGHT*0.32+25);

ctx.strokeRect(inputX,HEIGHT*0.22,WIDTH*0.3,50);
ctx.strokeRect(inputX,HEIGHT*0.32,WIDTH*0.3,50);

ctx.textAlign="left";
ctx.fillText(inputRounds,inputX+10,HEIGHT*0.22+25);
ctx.fillText(inputArrows,inputX+10,HEIGHT*0.32+25);

drawKeypad();

drawButton(WIDTH*0.25,HEIGHT-140,"DEL","#e74c3c","del");
drawButton(WIDTH*0.55,HEIGHT-140,"START","#2ecc71","start");
}

// ---------- GAME ----------
function drawGame(){
drawTarget();

let w=(WIDTH-40)/3;

drawButton(10,HEIGHT-90,"Hist","#3498db","hist");
drawButton(20+w,HEIGHT-90,"Reset","#f39c12","reset");
drawButton(30+2*w,HEIGHT-90,"Restart","#e74c3c","restart");
}

// ---------- NUMBER ----------
function drawNumber(){
drawTarget();
drawKeypad();

drawButton(WIDTH/2-BTN_W/2,HEIGHT-180,"READY","#2ecc71","ready");
drawButton(WIDTH/2-BTN_W/2,HEIGHT-90,"DEL","#e74c3c","delNum");
}

// ---------- CLICK ----------
canvas.addEventListener("mousedown",e=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

let key=handleKeypadClick(x,y);
if(key!==null){
if(state==="input"){
if(activeInput==="rounds")inputRounds+=key;
else inputArrows+=key;
}else if(state==="number"){
selectedNumber+=key;
}
return;
}

if(state==="input"){
if(y>HEIGHT-140){
if(x<WIDTH/2) inputRounds=inputRounds.slice(0,-1);
else{
numRounds=parseInt(inputRounds);
maxArrows=parseInt(inputArrows);
if(numRounds&&maxArrows)state="game";
}
}
}
});

// ---------- LOOP ----------
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

WIDTH=canvas.width;
HEIGHT=canvas.height;
center={x:WIDTH/2,y:HEIGHT/3};

// кнопки одинаковые
BTN_W=Math.min(180,WIDTH/4);
BTN_H=BTN_W*0.75; // +50% высоты

// клавиатура
KEY_SIZE=Math.min(80,WIDTH/8);
KEY_GAP=12;
KEY_START_Y=HEIGHT*0.55;

if(state==="input")drawInput();
else if(state==="game")drawGame();
else if(state==="number")drawNumber();

requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
